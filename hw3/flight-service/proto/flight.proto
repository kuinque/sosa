syntax = "proto3";

package flight;

import "google/protobuf/timestamp.proto";

option go_package = "flight/proto";

// Flight Service - manages flights and seat reservations
service FlightService {
  // Search flights by route and optional date
  rpc SearchFlights(SearchFlightsRequest) returns (SearchFlightsResponse);
  
  // Get flight information by ID
  rpc GetFlight(GetFlightRequest) returns (GetFlightResponse);
  
  // Reserve seats for a booking (atomic operation)
  rpc ReserveSeats(ReserveSeatsRequest) returns (ReserveSeatsResponse);
  
  // Release reservation (return seats)
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReleaseReservationResponse);
}

// Flight status enum
enum FlightStatus {
  FLIGHT_STATUS_UNSPECIFIED = 0;
  FLIGHT_STATUS_SCHEDULED = 1;
  FLIGHT_STATUS_DEPARTED = 2;
  FLIGHT_STATUS_CANCELLED = 3;
  FLIGHT_STATUS_COMPLETED = 4;
}

// Reservation status enum
enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  RESERVATION_STATUS_ACTIVE = 1;
  RESERVATION_STATUS_RELEASED = 2;
  RESERVATION_STATUS_EXPIRED = 3;
}

// Flight information
message Flight {
  string id = 1;
  string flight_number = 2;
  string airline = 3;
  string origin = 4;           // IATA code (e.g., SVO)
  string destination = 5;      // IATA code (e.g., LED)
  google.protobuf.Timestamp departure_time = 6;
  google.protobuf.Timestamp arrival_time = 7;
  int32 total_seats = 8;
  int32 available_seats = 9;
  double price = 10;           // Price per seat
  FlightStatus status = 11;
}

// Seat reservation information
message SeatReservation {
  string id = 1;
  string flight_id = 2;
  string booking_id = 3;
  int32 seat_count = 4;
  ReservationStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
}

// SearchFlights - search by route and optional date
message SearchFlightsRequest {
  string origin = 1;           // Required: IATA code
  string destination = 2;      // Required: IATA code
  google.protobuf.Timestamp date = 3;  // Optional: filter by date
}

message SearchFlightsResponse {
  repeated Flight flights = 1;
}

// GetFlight - get flight by ID
message GetFlightRequest {
  string flight_id = 1;
}

message GetFlightResponse {
  Flight flight = 1;
}

// ReserveSeats - atomic seat reservation
// Error codes:
// - NOT_FOUND: flight not found
// - RESOURCE_EXHAUSTED: not enough available seats
// - INVALID_ARGUMENT: invalid seat_count or booking_id
message ReserveSeatsRequest {
  string flight_id = 1;
  string booking_id = 2;       // Unique booking ID for idempotency
  int32 seat_count = 3;
}

message ReserveSeatsResponse {
  SeatReservation reservation = 1;
}

// ReleaseReservation - release reserved seats
// Error codes:
// - NOT_FOUND: reservation not found for booking_id
message ReleaseReservationRequest {
  string booking_id = 1;
}

message ReleaseReservationResponse {
  SeatReservation reservation = 1;
}
